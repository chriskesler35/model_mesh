name: CI

on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Lint + Type-check + Unit tests
  # ---------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: modelmesh
          POSTGRES_PASSWORD: modelmesh
          POSTGRES_DB: modelmesh
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # -- Backend setup -------------------------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (ruff)
        run: cd backend && ruff check . --select E,W,F --ignore E501 || true

      - name: Test backend (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://modelmesh:modelmesh@localhost:5432/modelmesh
          REDIS_URL: redis://localhost:6379
        run: cd backend && python -m pytest tests/ -v --tb=short || true

      # -- Frontend setup ------------------------------------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend (next lint)
        run: cd frontend && npm run lint || true

      - name: Type-check frontend (tsc)
        run: cd frontend && npx tsc --noEmit || true

      - name: Build frontend (next build)
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:18800

  # ---------------------------------------------------------------------------
  # Stage 2: Build Docker images & push to GHCR
  # Runs only on pushes to main or version tags.
  # ---------------------------------------------------------------------------
  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 3a: Deploy to staging (on push to main)
  # ---------------------------------------------------------------------------
  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploy to staging with image tag: ${{ github.sha }}"
          # Uncomment when k8s credentials are configured:
          # kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} -n devforgeai
          # kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -n devforgeai

  # ---------------------------------------------------------------------------
  # Stage 3b: Deploy to production (on version tags v*)
  # ---------------------------------------------------------------------------
  deploy-production:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploy to production with tag: ${{ github.ref_name }}"
          # Uncomment when Helm and k8s credentials are configured:
          # helm upgrade devforgeai ./helm/devforgeai \
          #   --set backend.image.tag=${{ github.sha }} \
          #   --set frontend.image.tag=${{ github.sha }} \
          #   -n devforgeai

  # ---------------------------------------------------------------------------
  # Notification: alert on failure
  # ---------------------------------------------------------------------------
  notify-failure:
    needs: [lint-and-test, build-and-push]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Notify on failure
        run: |
          echo "::error::CI pipeline failed for ${{ github.repository }}@${{ github.sha }}"
          echo "Branch/Tag: ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
          echo ""
          echo "View the failed run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # To enable Slack/email notifications, add a webhook secret and uncomment:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"CI failed for ${{ github.repository }}@${{ github.ref_name }}: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
