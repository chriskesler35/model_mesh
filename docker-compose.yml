services:
  postgres:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: modelmesh
      POSTGRES_USER: modelmesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modelmesh_local_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelmesh -d modelmesh"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "15432:5432"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-modelmesh_redis_dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-modelmesh_redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "16379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "19000:18800"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://modelmesh:${POSTGRES_PASSWORD:-modelmesh_local_dev}@postgres:5432/modelmesh
      REDIS_URL: redis://:${REDIS_PASSWORD:-modelmesh_redis_dev}@redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MODELMESH_API_KEY: ${MODELMESH_API_KEY:-modelmesh_local_dev_key}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "18801:3000"
    depends_on:
      - backend
    environment:
      # Internal URL for SSR (Docker network)
      INTERNAL_API_URL: http://backend:18800
      # Public URL for client-side (browser)
      NEXT_PUBLIC_API_URL: http://localhost:19000
      NEXT_PUBLIC_MODELMESH_API_KEY: modelmesh_local_dev_key

volumes:
  postgres_data:
  redis_data: