<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerGrad)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1" stroke="#667eea" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="400" fill="url(#forgeGrad)"/>
  
  <!-- Large Icon -->
  <g transform="translate(100, 100)">
    <!-- Anvil shape -->
    <path d="M50 140 L50 100 L65 100 L65 80 L135 80 L135 100 L150 100 L150 140 L130 140 L130 150 L70 150 L70 140 Z" 
          fill="#1a1a2e" 
          stroke="url(#forgeGrad)" 
          stroke-width="3"/>
    
    <!-- Hammer strike -->
    <path d="M100 60 L105 50 L100 35 L95 50 Z" fill="#ffd700"/>
    <path d="M85 55 L75 50 L85 45 Z" fill="#ffd700" opacity="0.8"/>
    <path d="M115 55 L125 50 L115 45 Z" fill="#ffd700" opacity="0.8"/>
    
    <!-- AI circuit lines -->
    <g stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.5">
      <path d="M30 100 L50 100"/>
      <path d="M150 100 L170 100"/>
      <path d="M100 150 L100 170"/>
      <circle cx="30" cy="100" r="4" fill="#00d9ff"/>
      <circle cx="170" cy="100" r="4" fill="#00d9ff"/>
      <circle cx="100" cy="170" r="4" fill="#00d9ff"/>
    </g>
  </g>
  
  <!-- Main text -->
  <text x="300" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)">
    DevForgeAI
  </text>
  
  <!-- Tagline -->
  <text x="300" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#8892b0">
    Forge Intelligent Solutions
  </text>
  
  <!-- Feature list -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ccd6f6">
    <text x="300" y="280">
      <tspan fill="#00d9ff">●</tspan> Multi-Agent Orchestration
    </text>
    <text x="550" y="280">
      <tspan fill="#00d9ff">●</tspan> Image Generation
    </text>
    <text x="750" y="280">
      <tspan fill="#00d9ff">●</tspan> Memory & Context
    </text>
    <text x="950" y="280">
      <tspan fill="#00d9ff">●</tspan> Self-Healing
    </text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="380" width="1200" height="20" fill="url(#forgeGrad)" opacity="0.3"/>
</svg>