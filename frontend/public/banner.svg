<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Decorative mesh pattern (background) -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1"/>
  <circle cx="150" cy="150" r="80" fill="none" stroke="#10b981" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="300" r="100" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.1"/>
  
  <!-- Main icon -->
  <g transform="translate(100, 100)">
    <circle cx="50" cy="50" r="45" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <circle cx="30" cy="30" r="5" fill="#10b981"/>
    <circle cx="70" cy="30" r="5" fill="#059669"/>
    <circle cx="50" cy="50" r="6" fill="#047857"/>
    <circle cx="30" cy="70" r="5" fill="#059669"/>
    <circle cx="70" cy="70" r="5" fill="#10b981"/>
    <line x1="30" y1="30" x2="50" y2="50" stroke="#10b981" stroke-width="2"/>
    <line x1="70" y1="30" x2="50" y2="50" stroke="#059669" stroke-width="2"/>
    <line x1="30" y1="70" x2="50" y2="50" stroke="#059669" stroke-width="2"/>
    <line x1="70" y1="70" x2="50" y2="50" stroke="#10b981" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="320" y="140" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#047857">
    ModelMesh
  </text>
  <text x="320" y="200" font-family="Arial, sans-serif" font-size="24" fill="#059669">
    Intelligent AI Gateway
  </text>
  <text x="320" y="240" font-family="Arial, sans-serif" font-size="16" fill="#0d9488" opacity="0.9">
    Route requests to optimal models based on cost, capability, and configuration
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(320, 280)">
    <rect width="150" height="35" rx="6" fill="white" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="10" y="22" font-family="Arial, sans-serif" font-size="12" fill="#047857" font-weight="bold">✓ Unified API</text>
    
    <rect x="170" width="150" height="35" rx="6" fill="white" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="180" y="22" font-family="Arial, sans-serif" font-size="12" fill="#047857" font-weight="bold">✓ Cost Tracking</text>
    
    <rect x="340" width="150" height="35" rx="6" fill="white" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="350" y="22" font-family="Arial, sans-serif" font-size="12" fill="#047857" font-weight="bold">✓ Smart Routing</text>
  </g>
</svg>