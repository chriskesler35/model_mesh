<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Mesh structure -->
  <g filter="drop-shadow(0 1px 2px rgba(0,0,0,0.05))">
    <!-- Central hub -->
    <circle cx="100" cy="100" r="12" fill="#10b981"/>
    
    <!-- Primary nodes -->
    <circle cx="65" cy="65" r="7" fill="#059669"/>
    <circle cx="135" cy="65" r="7" fill="#059669"/>
    <circle cx="65" cy="135" r="7" fill="#059669"/>
    <circle cx="135" cy="135" r="7" fill="#059669"/>
    
    <!-- Secondary nodes -->
    <circle cx="100" cy="50" r="5" fill="#10b981" opacity="0.8"/>
    <circle cx="150" cy="100" r="5" fill="#10b981" opacity="0.8"/>
    <circle cx="100" cy="150" r="5" fill="#10b981" opacity="0.8"/>
    <circle cx="50" cy="100" r="5" fill="#10b981" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="65" y1="65" x2="100" y2="100" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    <line x1="135" y1="65" x2="100" y2="100" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    <line x1="65" y1="135" x2="100" y2="100" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    <line x1="135" y1="135" x2="100" y2="100" stroke="#10b981" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Ring connections -->
    <line x1="100" y1="50" x2="65" y2="65" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="150" y1="100" x2="135" y2="65" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="100" y1="150" x2="135" y2="135" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="50" y1="100" x2="65" y2="135" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>