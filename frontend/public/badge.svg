<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="0" y="0" width="300" height="100" rx="12" ry="12" fill="#0f0f23"/>
  
  <!-- Accent line -->
  <rect x="0" y="0" width="4" height="100" fill="url(#badgeGrad)"/>
  
  <!-- Icon on left -->
  <g transform="translate(20, 20)">
    <!-- Anvil -->
    <path d="M15 50 L15 35 L20 35 L20 25 L40 25 L40 35 L45 35 L45 50 L40 50 L40 55 L20 55 L20 50 Z" 
          fill="url(#badgeGrad)"/>
    <!-- Spark -->
    <path d="M30 20 L32 15 L30 10 L28 15 Z" fill="#ffd700"/>
    <path d="M25 18 L20 15 L25 12 Z" fill="#ffd700" opacity="0.8"/>
    <path d="M35 18 L40 15 L35 12 Z" fill="#ffd700" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="url(#textGrad)">
    DevForgeAI
  </text>
  <text x="80" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#8892b0">
    Intelligent Development Platform
  </text>
  
  <!-- Version badge -->
  <rect x="80" y="70" width="40" height="16" rx="4" fill="#e94560" opacity="0.2"/>
  <text x="100" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#e94560" text-anchor="middle">
    v2.0
  </text>
</svg>