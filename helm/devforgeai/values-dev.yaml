# Development environment overrides
# Usage: helm install devforgeai ./helm/devforgeai -f helm/devforgeai/values-dev.yaml

namespace: devforgeai-dev

backend:
  replicaCount: 1
  image:
    tag: dev
    pullPolicy: Always
  resources:
    requests:
      memory: "64Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

frontend:
  replicaCount: 1
  image:
    tag: dev
    pullPolicy: Always
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "250m"

ingress:
  enabled: true
  className: nginx
  host: devforgeai.dev.local
  tls:
    enabled: false

secrets:
  modelmeshApiKey: "modelmesh_local_dev_key"

postgresql:
  enabled: true
  auth:
    username: modelmesh
    password: modelmesh_dev
    database: modelmesh
  primary:
    persistence:
      size: 1Gi

redis:
  enabled: true
  auth:
    password: devforgeai-redis-dev
  master:
    persistence:
      size: 256Mi
