{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devforgeai.fullname" . }}-secrets
  namespace: {{ include "devforgeai.namespace" . }}
  labels:
    {{- include "devforgeai.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | b64enc | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  MODELMESH_API_KEY: {{ .Values.secrets.modelmeshApiKey | b64enc | quote }}
{{- end }}
