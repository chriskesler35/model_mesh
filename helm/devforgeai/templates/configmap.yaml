apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devforgeai.fullname" . }}-config
  namespace: {{ include "devforgeai.namespace" . }}
  labels:
    {{- include "devforgeai.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ include "devforgeai.databaseURL" . | quote }}
  REDIS_URL: {{ include "devforgeai.redisURL" . | quote }}
  BACKEND_PORT: {{ .Values.backend.port | quote }}
  FRONTEND_PORT: {{ .Values.frontend.port | quote }}
  INTERNAL_API_URL: "http://{{ include "devforgeai.fullname" . }}-backend:{{ .Values.backend.port }}"
  NEXT_PUBLIC_API_URL: "http://{{ .Values.ingress.host }}"
