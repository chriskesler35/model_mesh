apiVersion: v1
kind: Service
metadata:
  name: {{ include "devforgeai.fullname" . }}-frontend
  namespace: {{ include "devforgeai.namespace" . }}
  labels:
    {{- include "devforgeai.frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "devforgeai.frontend.selectorLabels" . | nindent 4 }}
