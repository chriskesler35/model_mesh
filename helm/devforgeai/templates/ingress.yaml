{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "devforgeai.fullname" . }}-ingress
  namespace: {{ include "devforgeai.namespace" . }}
  labels:
    {{- include "devforgeai.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Backend API routes
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "devforgeai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "devforgeai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ include "devforgeai.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "devforgeai.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
