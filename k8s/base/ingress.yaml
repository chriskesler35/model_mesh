apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devforgeai-ingress
  namespace: devforgeai
  labels:
    app.kubernetes.io/part-of: devforgeai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Enable WebSocket support for SSE/streaming
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  # Uncomment and configure for TLS:
  # tls:
  #   - hosts:
  #       - devforgeai.local
  #     secretName: devforgeai-tls
  rules:
    - host: devforgeai.local
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 18800
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 18800
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
