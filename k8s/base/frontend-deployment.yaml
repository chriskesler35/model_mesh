apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devforgeai
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: devforgeai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: devforgeai
    spec:
      containers:
        - name: frontend
          image: devforgeai/frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: INTERNAL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: devforgeai-config
                  key: INTERNAL_API_URL
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: devforgeai-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: 125m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
