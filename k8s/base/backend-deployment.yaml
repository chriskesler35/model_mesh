apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devforgeai
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: devforgeai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: devforgeai
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres to be ready..."
              until nc -z postgres 5432; do
                echo "Postgres not ready, sleeping 2s..."
                sleep 2
              done
              echo "Postgres is ready."
      containers:
        - name: backend
          image: devforgeai/backend:latest
          ports:
            - containerPort: 18800
              name: http
          envFrom:
            - configMapRef:
                name: devforgeai-config
            - secretRef:
                name: devforgeai-secrets
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 18800
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 18800
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
