apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: devforgeai
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: devforgeai
spec:
  schedule: "0 2 * * *"  # Nightly at 2:00 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: db-backup
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: devforgeai
        spec:
          restartPolicy: Never
          containers:
            - name: pg-dump
              image: postgres:16
              command:
                - sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/backups/devforgeai-${TIMESTAMP}.sql.gz"

                  echo "Starting database backup at ${TIMESTAMP}..."
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h postgres \
                    -U modelmesh \
                    -d modelmesh \
                    --no-owner \
                    --no-privileges \
                    --format=custom \
                    | gzip > "${BACKUP_FILE}"

                  BACKUP_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                  echo "Backup complete: ${BACKUP_FILE} (${BACKUP_SIZE})"

                  # Prune backups older than 30 days
                  echo "Pruning backups older than 30 days..."
                  find /backups -name "devforgeai-*.sql.gz" -mtime +30 -delete
                  echo "Pruning complete."

                  # Optional: Upload to S3 if credentials are available
                  if [ -n "${S3_BUCKET}" ]; then
                    echo "Uploading to S3: s3://${S3_BUCKET}/db-backups/"
                    # Requires aws-cli in the image or a sidecar
                    # aws s3 cp "${BACKUP_FILE}" "s3://${S3_BUCKET}/db-backups/"
                    echo "S3 upload skipped — enable by adding aws-cli to the image."
                  fi
              env:
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: devforgeai-secrets
                      key: POSTGRES_PASSWORD
                - name: S3_BUCKET
                  value: ""  # Set to your S3 bucket name to enable uploads
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: db-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-backup-pvc
  namespace: devforgeai
  labels:
    app.kubernetes.io/name: db-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: devforgeai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
